services:
  # API Flask
  api:
    build:
      context: .
      dockerfile: Dockerfile.api  # Dockerfile específico para API
    container_name: flask_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=api.py
      - FLASK_ENV=development
      - FLASK_RUN_HOST=0.0.0.0  # FORÇAR host 0.0.0.0
      - FLASK_RUN_PORT=5000
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/app
    working_dir: /app/api  # Diretório específico da API
    networks:
      - app-network
    command: flask run --host=0.0.0.0 --port=5000

  # Aplicação principal
  app:
    build:
      context: .
      dockerfile: Dockerfile.app  # Dockerfile específico para App
    container_name: main_app
    restart: unless-stopped
    volumes:
      - ./:/app
    working_dir: /app  # Ou /app/frontend se tiver subdiretório
    # Comando será definido no Dockerfile.app

networks:
  app-network:
    driver: bridge